<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .card {
            height: 100vh; /* 100% of the viewport height */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
        }

        #card1 {
            background-color: green;
            color: white;
        }

        #card2 {
            background-color: yellow;
            color: black;
        }

        #card3 {
            background-color: red;
            color: white;
        }
    </style>
    <title>Full Screen Cards</title>
</head>
<body>
    <div id="card1" class="card">Good</div>
    <div id="card2" class="card">Neither Good nor Bad</div>
    <div id="card3" class="card">Bad</div>
</body>
</html>
